# Backlog — local tier
#
# Optional. A lightweight work queue used when you are not yet ready to
# write a full SDD proposal, or have no external tracker (Linear / GitHub
# Issues) configured.
#
# Managed by /sdd:backlog. Do NOT edit this file by hand — the command
# enforces the schema, assigns IDs, and keeps state consistent with
# /sdd:start and /sdd:complete.
#
# Item schema:
#   - id: 1
#     summary: "Short description of the work"
#     priority: critical | high | medium | low
#     status: queued | in_progress | done | cut
#     added: YYYY-MM-DD
#     promoted_to_cycle: "{slug}"      # set when /sdd:start --from backlog:N
#     notes: |
#       optional free-form detail

items:
  - id: 1
    summary: "auth-role-split"
    priority: critical
    status: done
    added: 2026-04-27
    promoted_to_cycle: "auth-role-split"
    promoted_at: "2026-04-30"
    completed_at: "2026-04-30"
    notes: |
      Custom Python email + password auth on FastAPI: bcrypt password
      hashing, JWT (HS256, 7-day) + httpOnly refresh-token cookie,
      transactional signup verification email (single SMTP/Postmark
      exception per system_design Subsystem 7), password reset flow.

      Non-transferable role_type ∈ {user, founder} on every account —
      this is the structural bedrock the constitution's "Never let
      founder accounts post in user communities" principle depends on.
      Role-aware middleware: founder endpoints reject role_type=user
      and vice versa.

      Anti-abuse: rate limit signup (5/hr/IP) and login (10/min/IP)
      via slowapi or redis-based middleware.

      Endpoints: POST /api/auth/signup, /api/auth/login, /api/auth/
      forgot-password, /api/auth/reset-password.

      Size: L. Depends on: nothing — foundation for everything else.

  - id: 2
    summary: "question-bank-and-answer-capture"
    priority: critical
    status: done
    added: 2026-04-27
    promoted_to_cycle: "question-bank-and-answer-capture"
    promoted_at: "2026-04-30"
    completed_at: "2026-05-01"
    notes: |
      MongoDB `questions` collection seeded with 10–15 hand-authored
      core questions across categories: role / stack / workflow /
      friction / wishlist / budget. Each question has key, text,
      kind (single_select | multi_select | free_text), options[],
