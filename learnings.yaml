# Cycle Learnings
#
# Populated by /sdd:complete when a cycle archives.
# Each entry captures an insight surfaced by working through a cycle —
# process, technical, or product — that would be useful to future cycles.
#
# Format:
#   - date: YYYY-MM-DD
#     cycle: "{slug}"
#     insight: "{one-to-three sentence observation}"
#     category: "process" | "technical" | "product"
#
# Keep entries terse and specific. Don't duplicate what's already in the
# spec or the archive — write down what was surprising, what you'd tell
# a teammate in a hallway, what you'd do differently next time.

learnings:
  - date: 2026-04-30
    cycle: "auth-role-split"
    insight: |
      Tension surfacing at /sdd:start was the highest-leverage moment of the cycle. The
      first-pass tasks.md inherited every nice-to-have from system_design.md (email
      verification, password reset, invite tree, slowapi rate limiting). Pushing back at
      the proposal stage cut those four out of V1 and saved roughly half the cycle. Future
      cycles: trust the tension list more than the backlog item description; the backlog
      item is the source's wishlist, the tension list is the cycle's actual scope.
    category: process
  - date: 2026-04-30
    cycle: "auth-role-split"
    insight: |
      Deferred decisions belong in the cycle that needs them, not in the proposal. JWT
      transport (header vs cookie) was scoped as a "decide before implementing" task and
      decided inside the implementation file's docstring, not in proposal.md. This kept
      the proposal focused on what the cycle ships and let the decision live next to the
      code that depends on it. Same model worked for the embedding-model decision deferred
      to the weaviate-pipeline cycle (#4).
    category: process
  - date: 2026-04-30
    cycle: "auth-role-split"
    insight: |
      Lifespan should validate every required env var at boot, not at first-request use.
      Hit this during manual validation: a fresh .env left JWT_SECRET blank and the failure
      surfaced as a 500 with a deep traceback at the first signup. Added a lifespan-time
      check that refuses to boot if any required env is missing. Apply this pattern to
      every future cycle that adds a new required env variable.
    category: technical
  - date: 2026-04-30
    cycle: "auth-role-split"
    insight: |
      mongomock-motor as the test stand-in for MongoDB lets the test suite run offline
      without Docker or Atlas. Pairing it with making init_mongo() idempotent (skip if
      _client is already set) was clean: the test fixture pre-injects the mock client,
      then lifespan's init_mongo() short-circuits. No FastAPI dependency overrides
      required. Reuse this pattern for cycle #4 (weaviate-pipeline) and beyond.
    category: testing
  - date: 2026-05-01
    cycle: "question-bank-and-answer-capture"
    insight: |
      Seed loaders need a "split layer" the moment tests touch them. Original
      seed_questions() owned the full mongo lifecycle (load .env, init_mongo, upsert,
      close_mongo) -- which closed the test fixture's mongomock client mid-run and
      broke later assertions. Split into three: load_seed_file (pure), apply_seed
      (validate + upsert, no lifecycle), seed_questions (CLI orchestrator). Tests
      call the inner functions; CLI calls the orchestrator. Apply this pattern
      proactively to cycle #3's catalog seed -- don't repeat the discovery.
    category: testing
  - date: 2026-05-01
    cycle: "question-bank-and-answer-capture"
    insight: |
      Defense in depth at multiple layers is worth the cost when the principle is
      constitutional. require_role("user") on the endpoints is sufficient to bar
      founders, but get_or_create_profile also rejects founders at the data layer
      with a separate audit test. Future cycles that mount profile-touching
      handlers can inadvertently skip the middleware; the helper-layer guard
      means a regression is caught in tests, not in production. The cost is one
      if-check and one test. The benefit is that "Never let founder accounts post
      in user communities" survives careless refactors.
    category: process
  - date: 2026-05-01
    cycle: "question-bank-and-answer-capture"
    insight: |
      Schema reservation is cheap and prevents migration drama. The profiles
      collection schema in this cycle includes role, current_tools, workflows,
      tools_tried_bounced, counterfactual_wishes, budget_tier, embedding_vector_id,
      last_recompute_at -- all explicitly null/empty defaults populated by
      future cycles. No fields are inferred or computed in this cycle, but
      naming them now means future cycles add behavior without schema
      migrations. Mongo makes this almost free; do it for every mutable
      document a future cycle will touch.
    category: technical
  - date: 2026-05-01
    cycle: "catalog-seed-and-curation"
    insight: |
      Outsourcing data generation to a separate agent (via a self-contained
      prompt file) was the right call. I generate code well; I hallucinate URLs
      and pricing. The pattern: write a prompt file as a permanent repo artifact,
      user runs it through a different agent, paste output back as a JSON file,
      validate-then-load. Reusable for any cycle whose deliverable is data the
      user wouldn't want me to make up. Catalog refreshes are now just
      "re-run the prompt and diff the JSON." Apply this pattern to any future
      "seed N items of type X" work.
    category: process
  - date: 2026-05-01
    cycle: "catalog-seed-and-curation"
    insight: |
      Mongo upsert with a filter that intentionally excludes the existing row
      does NOT silently no-op -- it tries to INSERT, which then collides with
      whatever unique index covers the slug/key. The "natural" defense-in-depth
      filter (`{slug, source != "founder_launch"}` with `upsert=True`) raises
      DuplicateKeyError instead of skipping. Fix: do an explicit find_one first,
      bail early if the row is protected, then upsert without that filter.
      Two round trips, but the contract matches the docstring. Caught only
      because the audit test set up the exact "founder row already there"
      condition we were defending against.
    category: technical
  - date: 2026-05-01
    cycle: "catalog-seed-and-curation"
    insight: |
      `ADMIN_EMAILS` env-var allowlist was the right V1 punt. The original
      system_design wanted an `admin` role added to the constitutional
      `user|founder` enum -- which would have been a C2 amendment of F-AUTH-4
      ("role_type is non-transferable"). Instead: the admin gate is an
      orthogonal check (email-in-list), not a third role. The constitution
      stays intact, V1 ships, V1.5+ replaces this with proper RBAC. General
      pattern: when a feature wants to extend a constitutional enum,
      ask whether an orthogonal check would suffice for V1.
    category: process
  - date: 2026-05-02
    cycle: "weaviate-pipeline"
    insight: |
      Mid-cycle pivots are OK while a cycle is still in implementation. User
      changed the vector store from Atlas Vector Search to Weaviate Cloud
      after the impl was nominally done but before /sdd:complete had run.
      Spec-delta + proposal were edited in place rather than via /vkf/amend
      because the cycle was still active. Rule: if the cycle is still in
      `current_cycle` state, edit the spec-delta directly; once it's been
      merged into specs/features/, future changes go through /vkf/amend.
    category: process
  - date: 2026-05-02
    cycle: "weaviate-pipeline"
    insight: |
      Changing a `$setOnInsert` default does NOT migrate existing rows.
      Cycle #4 changed the seed loader's curation_status default from
      "pending" to "approved". Re-running the seed reported `updated: 0`
      because Mongo's `$setOnInsert` only fires when a row is being
      created. Existing rows kept their old default. Future cycles that
      change a default should include an explicit one-shot data migration
      step in tasks.md (e.g., `db.tools_seed.updateMany({field: "old"},
      {$set: {field: "new"}})`). Schema reservation patterns assume
      forward writes; defaults that need backfilling are a different beast.
    category: technical
  - date: 2026-05-02
    cycle: "weaviate-pipeline"
    insight: |
      Weaviate v4's `data.replace()` is NOT an upsert -- it requires the
      object to already exist or returns 500. `data.insert()` is also
      not an upsert -- it requires the object to NOT exist. Neither is
      upsert on its own. The only way to upsert by deterministic UUID is
      try-insert / except-replace. Discovered when the first publish_tool
      call after backfill silently 500'd on every tool (best-effort
      publishes don't surface as failures). Fix: an `_upsert` helper that
      tries insert first, falls back to replace. Lesson: when wrapping a
      third-party client in a "publish" abstraction, exercise the API
      end-to-end against real infra at least once before declaring the
      cycle done -- not just unit tests with mocks.
    category: technical
  - date: 2026-05-02
    cycle: "weaviate-pipeline"
    insight: |
      Best-effort writes need a recovery surface. `publish_tool` is wrapped
      in try/except so failures don't block the calling request -- right
      design for graceful degradation. But when 546 publishes silently
      failed during the original backfill, there was no clean recovery
      path -- the Mongo embeddings were fine, only Weaviate was empty.
      Added `python -m app.embeddings republish-tools` as the explicit
      "push existing Mongo embeddings to Weaviate" command. Pattern: every
      best-effort write to an external system should have a corresponding
      "re-publish from source-of-truth" CLI for recovery.
    category: technical
  - date: 2026-05-02
    cycle: "fast-onboarding-match-and-graph"
    insight: |
      Two-mode endpoints are easier to reason about than blended ones.
      Considered a single similarity-based path that "just works" from
      question 1 -- but the first 3 answers don't carry enough signal
      to disambiguate at workflow granularity, AND running OpenAI on
      every tap is expensive UX. Splitting into generic mode (Q1-3,
      no OpenAI, role-bucket lookup) vs embedding mode (Q4+, OpenAI
      lazy-cached, Weaviate query) gave us sharp test boundaries,
      cheap first-impression UX, and a clear failure mode (embedding
      mode falls back to generic on any error). Reuse this pattern:
      when a feature has a "few inputs / many inputs" split in cost
      or quality, model it as discrete modes, not a blend.
    category: process
  - date: 2026-05-02
    cycle: "fast-onboarding-match-and-graph"
    insight: |
      Validation confusion around "which 'role' question are we
      talking about?" Two role-shaped fields exist in the system:
      (1) the SIGNUP question that splits user vs founder
      (role_type, set at /api/auth/signup), and (2) the ONBOARDING
      question role.primary_function, set later via /api/answers.
      User reasonably assumed answering "engineering" in (1)
      populated (2). Cycle worked fine but the spec language could
      be tighter. Future cycles that reuse "role" terminology should
      explicitly differentiate or pick a different word for one.
    category: product
  - date: 2026-05-02
    cycle: "fast-onboarding-match-and-graph"
    insight: |
      Diagnostic Python one-liners are worth their weight when a
      smoke test produces unexpected output. Wrote a 20-line script
      that pulled the user's role answer from Mongo and ran
      generic_match against their actual user_id; revealed in one
      command that the system was working correctly and the user
      had been smoke-testing an account that hadn't answered the
      role question yet. Pattern: keep a stash of "show me what's
      actually in the DB for user X" scripts handy; cheaper than
      adding a debug endpoint.
    category: process
