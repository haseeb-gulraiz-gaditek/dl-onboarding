      Endpoints: GET /api/questions/next (next core unanswered via
      next_logic), POST /api/answers (write + aggregate profile).

      Out of scope for this cycle: live narrowing graph, LLM follow-up
      questions, Weaviate embeddings — each gets its own cycle.

      Size: L. Depends on: #1.

  - id: 3
    summary: "catalog-seed-and-curation"
    priority: high
    status: done
    added: 2026-04-27
    promoted_to_cycle: "catalog-seed-and-curation"
    promoted_at: "2026-05-01"
    completed_at: "2026-05-01"
    notes: |
      Decision: NO Celery scrape job in V1 (changed from earlier
      system_design draft). Instead: Claude does deep research during
      this cycle and produces a seed JSON of ~300–500 AI tools.

      Tasks within this cycle's tasks.md will include:
        - Research and curate ~150 "all-time-best" tools across
          categories (productivity, creative, ops, content, design,
          dev, finance, education, lifestyle).
        - Research ~100 "gaining-traction" tools (notable last 6 mo).
        - Research ~50 "new" tools (launched last 30 d).
        - For each: name, slug, tagline, description, url,
          pricing_summary, categories[], integrations[], labels[]
          where labels ⊆ {new, all_time_best, gaining_traction}.

      Schema addition to `tools`: `labels: []` field (additive, none
      of the three labels is mutually exclusive with categories).

      Admin UI at /admin/catalog for add / edit / approve / re-label,
      plus a manual monthly refresh workflow (also in admin UI).

      Out of scope: scraping infrastructure, automated change
      detection, AI-agent enrichment — all V1.5+.

      Size: M (research is the bulk; admin UI is small). Depends on: #1.

  - id: 4
    summary: "weaviate-pipeline"
    priority: high
    status: done
    added: 2026-04-27
    promoted_to_cycle: "weaviate-pipeline"
    promoted_at: "2026-05-01"
    completed_at: "2026-05-02"
    notes: |
      Weaviate as a separate service (not co-located in Mongo).

      Embedding pipelines:
        - Tool embeddings: on `tools.curation_status=approved`
          transition, Celery task generates embedding and writes
          to Weaviate; `tools.embedding_vector_id` updated.
        - Profile embeddings: on `profiles` mutation, debounced
          Celery task (30s) regenerates embedding; `profiles.
          embedding_vector_id` updated.

      Embedding model decision: Claude embeddings vs.
      sentence-transformers (BGE / similar) — make the call inside
      this cycle's proposal.md based on cost vs. quality test on
      the curated 300 tools from #3.

      Out of scope: hybrid BM25 + vector search wiring (that lives
      in #5 and #6 where it's actually used).

      Size: M. Depends on: #2, #3.

  - id: 5
    summary: "fast-onboarding-match-and-graph"
    priority: high
    status: done
    added: 2026-04-27
    promoted_to_cycle: "fast-onboarding-match-and-graph"
    promoted_at: "2026-05-02"
    completed_at: "2026-05-02"
    notes: |
      The user-side magic-moment cycle (per updated system_design v0.2).

      Two-pane /onboarding UX: tap-to-answer questions on the left,
      live force-directed tool graph on the right. Graph is decorative-
      but-honest — it shows the actual recommender's current top-K.

      Backend: lightweight POST /api/onboarding/match endpoint doing
      ONLY Weaviate filter + vector search (no LLM, no clarifier, no
      ranker). Target latency: <200 ms. Returns top 5–10 candidates.
      Floor invariant: pool never collapses below 5 tools.

      Frontend lib choice: react-force-graph vs. vis-network vs.
      D3-force. Make the call as an ADR inside this cycle.

      Re-render trigger: on every answer write. Edges from
      `tools.metadata` integration / replacement signals.

      End-of-onboarding: full LLM-ranked pass produces 4–5 starter
      recommendations (vs. 2–3 weekly thereafter — see #6) plus 3
      community auto-suggestions (no directory browsing in V1).

      Size: L. Depends on: #4.

  - id: 6
    summary: "recommendation-engine"
    priority: high
    status: done
    added: 2026-04-27
    promoted_to_cycle: "recommendation-engine"
    promoted_at: "2026-05-02"
    completed_at: "2026-05-02"
    notes: |
      Full Celery `generate_recommendations` pipeline for the
      post-onboarding weekly cadence (and the end-of-onboarding
      starter-rec call).

      Pipeline:
        a. LLM clarifier (Claude Sonnet) reads profile + last 10
           answers + request context → structured query
           {intent, filters, exclude_tools[]}.
        b. Weaviate hybrid search: BM25 over descriptions + vector
           similarity (profile ↔ tools) + structured filters.
           Returns top 20–30 candidates.
        c. LLM ranker (Sonnet): receives candidates + profile, picks
           N (4–5 onboarding, 2–3 weekly), writes personalized
           reasoning string including explicit "skip this" guidance
           when a hyped match is a poor fit.
        d. Persist `recommendations` rows; cache_expires_at = now + 7d.

      Cache invalidation: profile mutation bumps
      `profiles.last_invalidated_at`; cache miss when
      `cache_expires_at < now` OR `last_invalidated_at > generated_at`.

      Cost ceiling: Sonnet per recommendation; 7-day caching bounds
      spend; estimated <$0.05 per fresh rec.

      Size: L. Depends on: #2, #4.

  - id: 7
    summary: "communities-and-flat-comments"
    priority: high
    status: done
    added: 2026-04-27
    promoted_to_cycle: "communities-and-flat-comments"
    promoted_at: "2026-05-02"
    completed_at: "2026-05-02"
    notes: |
      Communities + posts + flat comments + voting (V1: NO threading
      — `parent_comment_id` schema retained, API ignores it; threading
      deferred to V1.5).

      Seed: ~30–60 communities across 3 axes (role/job-function,
      tool/stack, problem/outcome). Spawned by Mesh staff; no user-
      created communities in V1.

      Endpoints:
        GET /communities, GET /c/:slug, GET /c/:slug/post/:id,
        POST /api/posts (kind ∈ {launch, using_this_week, discussion,
                                 tool_review}),
        POST /api/comments (flat, parent_comment_id always null in V1),
        POST /api/votes (target_type ∈ {post, comment, tool}),
        POST /api/communities/:id/{join, leave}.

      Ranking: HN formula (votes-1)/(time+2)^G with G=1.8 default,
      tunable per community.

      Cross-posting: posts default to one home community; user may
      fan out to up to 3.

      Anti-spam: founder accounts (role_type=founder) are blocked
      from posting in community feeds — enforced in middleware.
      Per-community karma stored in `community_memberships` (V1.5
      gates posting / flagging).

      Moderation: Mesh staff are mods on every community in V1.
      Flagging surface (`flagged` bool on posts/comments) feeds an
      admin queue.

      Size: L. Depends on: #1.

