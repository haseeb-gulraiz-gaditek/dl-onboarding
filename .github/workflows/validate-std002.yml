name: STD-002 validate

on:
  pull_request:
    paths:
      - "specs/**"
      - "changes/**"
      - "archive/**"
      - ".claude/commands/**"
      - ".github/scripts/validate-std002.py"
      - ".github/workflows/validate-std002.yml"
  push:
    branches: [main]
    paths:
      - "specs/**"
      - "changes/**"
      - "archive/**"
      - ".claude/commands/**"
      - ".github/scripts/validate-std002.py"
      - ".github/workflows/validate-std002.yml"
  workflow_dispatch:

jobs:
  validate:
    name: Structural check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run STD-002 structural validator
        run: python3 .github/scripts/validate-std002.py
