# Cycle Learnings
#
# Populated by /sdd:complete when a cycle archives.
# Each entry captures an insight surfaced by working through a cycle —
# process, technical, or product — that would be useful to future cycles.
#
# Format:
#   - date: YYYY-MM-DD
#     cycle: "{slug}"
#     insight: "{one-to-three sentence observation}"
#     category: "process" | "technical" | "product"
#
# Keep entries terse and specific. Don't duplicate what's already in the
# spec or the archive — write down what was surprising, what you'd tell
# a teammate in a hallway, what you'd do differently next time.

learnings:
  - date: 2026-04-30
    cycle: "auth-role-split"
    insight: |
      Tension surfacing at /sdd:start was the highest-leverage moment of the cycle. The
      first-pass tasks.md inherited every nice-to-have from system_design.md (email
      verification, password reset, invite tree, slowapi rate limiting). Pushing back at
      the proposal stage cut those four out of V1 and saved roughly half the cycle. Future
      cycles: trust the tension list more than the backlog item description; the backlog
      item is the source's wishlist, the tension list is the cycle's actual scope.
    category: process
  - date: 2026-04-30
    cycle: "auth-role-split"
    insight: |
      Deferred decisions belong in the cycle that needs them, not in the proposal. JWT
      transport (header vs cookie) was scoped as a "decide before implementing" task and
      decided inside the implementation file's docstring, not in proposal.md. This kept
      the proposal focused on what the cycle ships and let the decision live next to the
      code that depends on it. Same model worked for the embedding-model decision deferred
      to the weaviate-pipeline cycle (#4).
    category: process
  - date: 2026-04-30
    cycle: "auth-role-split"
    insight: |
      Lifespan should validate every required env var at boot, not at first-request use.
      Hit this during manual validation: a fresh .env left JWT_SECRET blank and the failure
      surfaced as a 500 with a deep traceback at the first signup. Added a lifespan-time
      check that refuses to boot if any required env is missing. Apply this pattern to
      every future cycle that adds a new required env variable.
    category: technical
  - date: 2026-04-30
    cycle: "auth-role-split"
    insight: |
      mongomock-motor as the test stand-in for MongoDB lets the test suite run offline
      without Docker or Atlas. Pairing it with making init_mongo() idempotent (skip if
      _client is already set) was clean: the test fixture pre-injects the mock client,
      then lifespan's init_mongo() short-circuits. No FastAPI dependency overrides
      required. Reuse this pattern for cycle #4 (weaviate-pipeline) and beyond.
    category: testing
  - date: 2026-05-01
    cycle: "question-bank-and-answer-capture"
    insight: |
      Seed loaders need a "split layer" the moment tests touch them. Original
      seed_questions() owned the full mongo lifecycle (load .env, init_mongo, upsert,
      close_mongo) -- which closed the test fixture's mongomock client mid-run and
      broke later assertions. Split into three: load_seed_file (pure), apply_seed
      (validate + upsert, no lifecycle), seed_questions (CLI orchestrator). Tests
      call the inner functions; CLI calls the orchestrator. Apply this pattern
      proactively to cycle #3's catalog seed -- don't repeat the discovery.
    category: testing
  - date: 2026-05-01
    cycle: "question-bank-and-answer-capture"
    insight: |
      Defense in depth at multiple layers is worth the cost when the principle is
      constitutional. require_role("user") on the endpoints is sufficient to bar
      founders, but get_or_create_profile also rejects founders at the data layer
      with a separate audit test. Future cycles that mount profile-touching
      handlers can inadvertently skip the middleware; the helper-layer guard
      means a regression is caught in tests, not in production. The cost is one
      if-check and one test. The benefit is that "Never let founder accounts post
      in user communities" survives careless refactors.
    category: process
  - date: 2026-05-01
    cycle: "question-bank-and-answer-capture"
    insight: |
      Schema reservation is cheap and prevents migration drama. The profiles
      collection schema in this cycle includes role, current_tools, workflows,
      tools_tried_bounced, counterfactual_wishes, budget_tier, embedding_vector_id,
      last_recompute_at -- all explicitly null/empty defaults populated by
      future cycles. No fields are inferred or computed in this cycle, but
      naming them now means future cycles add behavior without schema
      migrations. Mongo makes this almost free; do it for every mutable
      document a future cycle will touch.
    category: technical
