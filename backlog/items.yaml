  - id: 9
    summary: "launch-publish-and-concierge-nudge"
    priority: high
    status: done
    added: 2026-04-27
    promoted_to_cycle: "launch-publish-and-concierge-nudge"
    promoted_at: "2026-05-03"
    completed_at: "2026-05-03"
    notes: |
      Second half of the founder side. Triggered by an approved
      launch from #8.

      Dual-fire publish:
        a. Canonical product page at /p/:slug — likes count (denorm
           from `votes` target_type=tool), review count (from `posts`
           kind=tool_review with tool_id=this), launch metadata
           (founder, ICP, problem statement), engagement metrics
           (clicks, dwell from `engagements`).
        b. `posts` row with kind=launch, attached_launch_id, in EACH
           of the founder's 5–6 target communities (founder picks
           across 3 axes, Mesh suggests defaults). Each community
           post links back to /p/:slug.
        c. Celery `scan_launch_for_concierge_matches`: Weaviate query
           against the founder's ICP description embedding scoring
           every user profile.
           **Threshold gate: only top 5% match scores (or hard floor
           cosine ≥ 0.85) get a `concierge_nudge` notification.**
           Most launches will nudge 0–30 users, not 30–50.

      Concierge nudge UX: top banner on app open (non-blocking,
      dismissable) + notification in concierge tab. User responds
      skip / tell-me-more — each writes an `engagements` row.

      Skip feedback (locked):
        - Default: silent inference. Mesh downweights the matched
          tool's category/tag cluster in future matches for this
          user.
        - Top-1% skips (where match score was very high but user
          skipped): one-tap optional follow-up question — wrong
          category / already use one / pricey / just not now.

      Click-through tracking: GET /r/:launch_id?u=:user_token&s=:surface
      logs `engagements` row, 302 redirects to product_url with
      founder UTMs preserved. Optional client-side beacon for
      dwell-time (debounce ~1.5 s).

      No founder-side JS pixel in V1. No billing in V1 — schema is
      CPA-ready for V1.5.

      Size: L. Depends on: #6, #7, #8.

