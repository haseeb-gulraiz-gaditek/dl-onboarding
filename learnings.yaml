# Cycle Learnings
#
# Populated by /sdd:complete when a cycle archives.
# Each entry captures an insight surfaced by working through a cycle —
# process, technical, or product — that would be useful to future cycles.
#
# Format:
#   - date: YYYY-MM-DD
#     cycle: "{slug}"
#     insight: "{one-to-three sentence observation}"
#     category: "process" | "technical" | "product"
#
# Keep entries terse and specific. Don't duplicate what's already in the
# spec or the archive — write down what was surprising, what you'd tell
# a teammate in a hallway, what you'd do differently next time.

learnings:
  - date: 2026-04-30
    cycle: "auth-role-split"
    insight: |
      Tension surfacing at /sdd:start was the highest-leverage moment of the cycle. The
      first-pass tasks.md inherited every nice-to-have from system_design.md (email
      verification, password reset, invite tree, slowapi rate limiting). Pushing back at
      the proposal stage cut those four out of V1 and saved roughly half the cycle. Future
      cycles: trust the tension list more than the backlog item description; the backlog
      item is the source's wishlist, the tension list is the cycle's actual scope.
    category: process
  - date: 2026-04-30
    cycle: "auth-role-split"
    insight: |
      Deferred decisions belong in the cycle that needs them, not in the proposal. JWT
      transport (header vs cookie) was scoped as a "decide before implementing" task and
      decided inside the implementation file's docstring, not in proposal.md. This kept
      the proposal focused on what the cycle ships and let the decision live next to the
      code that depends on it. Same model worked for the embedding-model decision deferred
      to the weaviate-pipeline cycle (#4).
    category: process
  - date: 2026-04-30
    cycle: "auth-role-split"
    insight: |
      Lifespan should validate every required env var at boot, not at first-request use.
      Hit this during manual validation: a fresh .env left JWT_SECRET blank and the failure
      surfaced as a 500 with a deep traceback at the first signup. Added a lifespan-time
      check that refuses to boot if any required env is missing. Apply this pattern to
      every future cycle that adds a new required env variable.
    category: technical
  - date: 2026-04-30
    cycle: "auth-role-split"
    insight: |
      mongomock-motor as the test stand-in for MongoDB lets the test suite run offline
      without Docker or Atlas. Pairing it with making init_mongo() idempotent (skip if
      _client is already set) was clean: the test fixture pre-injects the mock client,
      then lifespan's init_mongo() short-circuits. No FastAPI dependency overrides
      required. Reuse this pattern for cycle #4 (weaviate-pipeline) and beyond.
    category: testing
  - date: 2026-05-01
    cycle: "question-bank-and-answer-capture"
    insight: |
      Seed loaders need a "split layer" the moment tests touch them. Original
      seed_questions() owned the full mongo lifecycle (load .env, init_mongo, upsert,
      close_mongo) -- which closed the test fixture's mongomock client mid-run and
      broke later assertions. Split into three: load_seed_file (pure), apply_seed
      (validate + upsert, no lifecycle), seed_questions (CLI orchestrator). Tests
      call the inner functions; CLI calls the orchestrator. Apply this pattern
      proactively to cycle #3's catalog seed -- don't repeat the discovery.
    category: testing
  - date: 2026-05-01
    cycle: "question-bank-and-answer-capture"
    insight: |
      Defense in depth at multiple layers is worth the cost when the principle is
      constitutional. require_role("user") on the endpoints is sufficient to bar
      founders, but get_or_create_profile also rejects founders at the data layer
      with a separate audit test. Future cycles that mount profile-touching
      handlers can inadvertently skip the middleware; the helper-layer guard
      means a regression is caught in tests, not in production. The cost is one
      if-check and one test. The benefit is that "Never let founder accounts post
      in user communities" survives careless refactors.
    category: process
  - date: 2026-05-01
    cycle: "question-bank-and-answer-capture"
    insight: |
      Schema reservation is cheap and prevents migration drama. The profiles
      collection schema in this cycle includes role, current_tools, workflows,
      tools_tried_bounced, counterfactual_wishes, budget_tier, embedding_vector_id,
      last_recompute_at -- all explicitly null/empty defaults populated by
      future cycles. No fields are inferred or computed in this cycle, but
      naming them now means future cycles add behavior without schema
      migrations. Mongo makes this almost free; do it for every mutable
      document a future cycle will touch.
    category: technical
  - date: 2026-05-01
    cycle: "catalog-seed-and-curation"
    insight: |
      Outsourcing data generation to a separate agent (via a self-contained
      prompt file) was the right call. I generate code well; I hallucinate URLs
      and pricing. The pattern: write a prompt file as a permanent repo artifact,
      user runs it through a different agent, paste output back as a JSON file,
      validate-then-load. Reusable for any cycle whose deliverable is data the
      user wouldn't want me to make up. Catalog refreshes are now just
      "re-run the prompt and diff the JSON." Apply this pattern to any future
      "seed N items of type X" work.
    category: process
  - date: 2026-05-01
    cycle: "catalog-seed-and-curation"
    insight: |
      Mongo upsert with a filter that intentionally excludes the existing row
      does NOT silently no-op -- it tries to INSERT, which then collides with
      whatever unique index covers the slug/key. The "natural" defense-in-depth
      filter (`{slug, source != "founder_launch"}` with `upsert=True`) raises
      DuplicateKeyError instead of skipping. Fix: do an explicit find_one first,
      bail early if the row is protected, then upsert without that filter.
      Two round trips, but the contract matches the docstring. Caught only
      because the audit test set up the exact "founder row already there"
      condition we were defending against.
    category: technical
  - date: 2026-05-01
    cycle: "catalog-seed-and-curation"
    insight: |
      `ADMIN_EMAILS` env-var allowlist was the right V1 punt. The original
      system_design wanted an `admin` role added to the constitutional
      `user|founder` enum -- which would have been a C2 amendment of F-AUTH-4
      ("role_type is non-transferable"). Instead: the admin gate is an
      orthogonal check (email-in-list), not a third role. The constitution
      stays intact, V1 ships, V1.5+ replaces this with proper RBAC. General
      pattern: when a feature wants to extend a constitutional enum,
      ask whether an orthogonal check would suffice for V1.
    category: process
  - date: 2026-05-02
    cycle: "weaviate-pipeline"
    insight: |
      Mid-cycle pivots are OK while a cycle is still in implementation. User
      changed the vector store from Atlas Vector Search to Weaviate Cloud
      after the impl was nominally done but before /sdd:complete had run.
      Spec-delta + proposal were edited in place rather than via /vkf/amend
      because the cycle was still active. Rule: if the cycle is still in
      `current_cycle` state, edit the spec-delta directly; once it's been
      merged into specs/features/, future changes go through /vkf/amend.
    category: process
  - date: 2026-05-02
    cycle: "weaviate-pipeline"
    insight: |
      Changing a `$setOnInsert` default does NOT migrate existing rows.
      Cycle #4 changed the seed loader's curation_status default from
      "pending" to "approved". Re-running the seed reported `updated: 0`
      because Mongo's `$setOnInsert` only fires when a row is being
      created. Existing rows kept their old default. Future cycles that
      change a default should include an explicit one-shot data migration
      step in tasks.md (e.g., `db.tools_seed.updateMany({field: "old"},
      {$set: {field: "new"}})`). Schema reservation patterns assume
      forward writes; defaults that need backfilling are a different beast.
    category: technical
  - date: 2026-05-02
    cycle: "weaviate-pipeline"
    insight: |
      Weaviate v4's `data.replace()` is NOT an upsert -- it requires the
      object to already exist or returns 500. `data.insert()` is also
      not an upsert -- it requires the object to NOT exist. Neither is
      upsert on its own. The only way to upsert by deterministic UUID is
      try-insert / except-replace. Discovered when the first publish_tool
      call after backfill silently 500'd on every tool (best-effort
      publishes don't surface as failures). Fix: an `_upsert` helper that
      tries insert first, falls back to replace. Lesson: when wrapping a
      third-party client in a "publish" abstraction, exercise the API
      end-to-end against real infra at least once before declaring the
      cycle done -- not just unit tests with mocks.
    category: technical
  - date: 2026-05-02
    cycle: "weaviate-pipeline"
    insight: |
      Best-effort writes need a recovery surface. `publish_tool` is wrapped
      in try/except so failures don't block the calling request -- right
      design for graceful degradation. But when 546 publishes silently
      failed during the original backfill, there was no clean recovery
      path -- the Mongo embeddings were fine, only Weaviate was empty.
      Added `python -m app.embeddings republish-tools` as the explicit
      "push existing Mongo embeddings to Weaviate" command. Pattern: every
      best-effort write to an external system should have a corresponding
      "re-publish from source-of-truth" CLI for recovery.
    category: technical
  - date: 2026-05-02
    cycle: "fast-onboarding-match-and-graph"
    insight: |
      Two-mode endpoints are easier to reason about than blended ones.
      Considered a single similarity-based path that "just works" from
      question 1 -- but the first 3 answers don't carry enough signal
      to disambiguate at workflow granularity, AND running OpenAI on
      every tap is expensive UX. Splitting into generic mode (Q1-3,
      no OpenAI, role-bucket lookup) vs embedding mode (Q4+, OpenAI
      lazy-cached, Weaviate query) gave us sharp test boundaries,
      cheap first-impression UX, and a clear failure mode (embedding
      mode falls back to generic on any error). Reuse this pattern:
      when a feature has a "few inputs / many inputs" split in cost
      or quality, model it as discrete modes, not a blend.
    category: process
  - date: 2026-05-02
    cycle: "fast-onboarding-match-and-graph"
    insight: |
      Validation confusion around "which 'role' question are we
      talking about?" Two role-shaped fields exist in the system:
      (1) the SIGNUP question that splits user vs founder
      (role_type, set at /api/auth/signup), and (2) the ONBOARDING
      question role.primary_function, set later via /api/answers.
      User reasonably assumed answering "engineering" in (1)
      populated (2). Cycle worked fine but the spec language could
      be tighter. Future cycles that reuse "role" terminology should
      explicitly differentiate or pick a different word for one.
    category: product
  - date: 2026-05-02
    cycle: "fast-onboarding-match-and-graph"
    insight: |
      Diagnostic Python one-liners are worth their weight when a
      smoke test produces unexpected output. Wrote a 20-line script
      that pulled the user's role answer from Mongo and ran
      generic_match against their actual user_id; revealed in one
      command that the system was working correctly and the user
      had been smoke-testing an account that hadn't answered the
      role question yet. Pattern: keep a stash of "show me what's
      actually in the DB for user X" scripts handy; cheaper than
      adding a debug endpoint.
    category: process
  - date: 2026-05-02
    cycle: "recommendation-engine"
    insight: |
      Mongomock-motor strips tzinfo on round-trip; production Motor
      preserves it. Writing `datetime.now(timezone.utc)` then
      reading it back produces a NAIVE datetime in tests but an
      AWARE one in prod. First TTL comparison `expires_at <= now`
      raised TypeError("can't compare offset-naive and offset-aware
      datetimes") -- a test-only failure invisible in prod until a
      Mongo restart wiped the cache. Fix: an `_as_utc` coercer that
      treats naive datetimes as UTC. Pattern for any future code
      reading datetime fields back from Mongo: always coerce to UTC
      before comparing, even in code that "obviously" only writes
      aware datetimes.
    category: testing
  - date: 2026-05-02
    cycle: "recommendation-engine"
    insight: |
      Monkey-patching a module-level function imported by name does
      NOT propagate to modules that already imported the symbol
      directly. engine.py does `from app.recommendations.ranker
      import rank_with_llm`, which binds the function into engine's
      namespace at import time. Patching `app.recommendations.ranker
      .rank_with_llm` leaves engine.rank_with_llm pointing at the
      original. The fix: patch BOTH locations, or restructure to
      import the module (`from app.recommendations import ranker`)
      and call `ranker.rank_with_llm(...)` so the lookup happens at
      call time. Future cycles using monkeypatch.setattr should
      grep for `from X import Y` to find every binding.
    category: testing
  - date: 2026-05-02
    cycle: "recommendation-engine"
    insight: |
      Caching a *degraded* response is the right default. First
      instinct was to skip caching when the ranker fails so the next
      request retries immediately. Wrong: a sustained OpenAI outage
      would pin every authenticated user against a flaming OpenAI
      endpoint, multiplying our 429s and our bill. Caching with
      `degraded: true` means we serve a slightly worse response for
      up to 7 days and let the next natural cache miss re-attempt.
      Generalizable principle: when the upstream is flaky, cache
      the failure shape too -- with a flag the client can read.
    category: architecture
  - date: 2026-05-02
    cycle: "communities-and-flat-comments"
    insight: |
      Mongomock-motor doesn't reliably enforce compound unique
      indexes -- the unique index on (user_id, community_id) didn't
      catch a duplicate insert in the test suite. Refactored
      community_memberships.add() from "insert + catch
      DuplicateKeyError" to "check then insert", which works in
      both environments. Production race window is closed by the
      real Mongo unique index regardless. Same pattern will
      probably bite when adding more compound-unique indexes
      across cycles -- prefer check-then-insert if the helper is
      called from a route that needs idempotency.
    category: testing
  - date: 2026-05-02
    cycle: "communities-and-flat-comments"
    insight: |
      Time-based sort-DESC over rapid bursts is undefined without
      a deterministic tie-breaker. Three posts created in
      successive lines of test code shared a created_at
      microsecond; mongomock returned them in insert order, real
      MongoDB might too, but neither is contractually
      newest-first. Adding _id DESC as the secondary sort fixed
      both posts and comments listings. Pattern: any "newest
      first" sort needs (timestamp DESC, _id DESC). ObjectIds
      embed a counter so the secondary sort is meaningful even
      within a microsecond.
    category: testing
  - date: 2026-05-02
    cycle: "communities-and-flat-comments"
    insight: |
      Single canonical post + cross_posted_to[] beats N copy-rows
      with shared post_group_id for vote-tally integrity.
      Considered the copy-row approach since each community could
      then track "engagement on this post in MY feed" -- but
      vote-splitting across copies destroys the ranking signal
      for the same content shown in different feeds. Going
      single-row means votes/comments accrue once; cross-posting
      is a discovery channel, not a stamp-collecting mechanic.
      Generalizable: when fan-out is for visibility, share the
      backing row; only fork when the per-fanout state truly
      diverges.
    category: architecture
  - date: 2026-05-02
    cycle: "founder-launch-submission-and-verification"
    insight: |
      Constitutional amendments belong in the cycle that needs the
      change, not after it. Cycle #8 surfaced "should launches
      appear in recommendations?" -- the original principle barred
      it. Rather than scaffold around the principle and patch later,
      ran /vkf:amend (C2) before scaffolding. The amendment commit
      sits at the head of the cycle branch, alongside the impl that
      depends on it. Pattern: when a tension touches the
      constitution, amend first, then scaffold; the amendment is
      part of the cycle's audit trail.
    category: process
  - date: 2026-05-02
    cycle: "founder-launch-submission-and-verification"
    insight: |
      Concurrency-safe state transitions via find_one_and_update
      filtered on the pre-state. Two admins clicking approve at
      the same instant could otherwise both write a
      tools_founder_launched row + both flip the launch row.
      Filtering the update on verification_status="pending" makes
      the transition atomic: whichever update lands first claims
      the resolution; the second sees None back from
      find_one_and_update and the route returns 409. Pattern for
      any "review queue" surface: condition the resolution write on
      the pre-state, not just the row id.
    category: architecture
  - date: 2026-05-02
    cycle: "founder-launch-submission-and-verification"
    insight: |
      Spec-delta wording can drift from implementation reality
      mid-cycle; treat early test failures as a chance to re-sync,
      not just to update tests. Two failures here surfaced spec
      bugs: (1) the spec said admin denial is `admin_required`, but
      cycle #3's actual code is `admin_only`; my test inherited the
      spec mistake. (2) the spec example showed `acme.io` slugifying
      to `acme`, but the algorithm I wrote (and prefer) keeps the
      full host as `acme-io`. I patched both in the spec-delta
      before merging. Pattern: when impl-vs-spec drift surfaces,
      pick the truer answer and fix BOTH the test and the spec.
    category: testing
  - date: 2026-05-03
    cycle: "launch-publish-and-concierge-nudge"
    insight: |
      The cycle #6 monkey-patch lesson hit again, in a place I
      didn't anticipate: app/launches/publish.py imported embed_text
      directly via `from app.embeddings.openai import embed_text`,
      so the autouse mock_openai_embed fixture (which patched the
      ranker and lifecycle modules) didn't cover it. Three tests
      passed in isolation but failed under the full suite — the
      OpenAI 401 error in the captured stdout was the giveaway.
      Pattern crystalizing: any new module that imports a mocked
      symbol needs a third (or fourth or fifth) monkeypatch site.
      Future-proofing idea: monkey-patch at the SOURCE module only
      (`app.embeddings.openai.embed_text`) and have callers do
      `from app.embeddings import openai; openai.embed_text(...)`.
      Worth refactoring once the patch list grows past 3 sites.
    category: testing
  - date: 2026-05-03
    cycle: "launch-publish-and-concierge-nudge"
    insight: |
      Synchronous orchestrators (no Celery) win for V1 admin
      surfaces. publish_launch runs 5 steps inline inside the
      approve route — embed ICP, embed founder tool, fan out N
      community posts, scan profiles, write notifications + bump
      caches. Worst case ~5s with the V1 user count. Two design
      moves made this safe: (1) per-step exception handling that
      logs and continues (partial success > rollback when the
      operation is genuinely idempotent at the row level), and
      (2) the fan-out is naturally bounded (≤6 communities, top-5
      profiles). When (2) holds, sync is the right call. When
      either bound grows, swap in a 202-Accepted pattern.
    category: architecture
  - date: 2026-05-03
    cycle: "launch-publish-and-concierge-nudge"
    insight: |
      Constitutional amendments paired with structural test assertions
      are stronger than either alone. The C2 amendment to We Always
      #3 (cycle #8) said "launches MAY appear alongside organic recs
      in a separate slot." Cycle #9's
      test_approved_launch_appears_in_launches_slot doesn't just check
      the launch is in `body["launches"]` — it ALSO asserts the slug
      is NOT in `body["recommendations"]`. The test encodes the
      principle: a future contributor merging the two arrays would
      break the test, surfacing the principle breach during code
      review rather than after a months-down-the-line audit. Pattern:
      every constitutional invariant should have at least one test
      that would fail if the invariant breaks.
    category: testing
  - date: 2026-05-03
    cycle: "my-tools-explore-new-tabs"
    insight: |
      Source-precedence as a baked-in upsert rule beats post-hoc
      reconciliation. user_tools.upsert_auto_from_profile checks the
      existing row's source rank and refuses to demote stronger
      sources (explicit_save) — so the auto-populate hook can run
      idempotently every time POST /api/answers fires without ever
      stomping a user's intentional save. Pattern: when two write
      paths target the same row (system-driven + user-driven),
      encode the precedence in the upsert helper, not in the route
      logic. Routes can stay dumb; the invariant is enforced once.
    category: architecture
  - date: 2026-05-03
    cycle: "my-tools-explore-new-tabs"
    insight: |
      Constitutional invariants benefit from a documented
      "boundary audit trail" section in the canonical spec. Cycle
      #10's spec ends with a list of which routes/helpers query
      which collection, with a reminder that find_tool_anywhere is
      the ONLY documented place that touches both. Future code
      review or AI assistance reading the spec sees the boundary
      explicitly, instead of inferring from scattered helper
      imports. Combine with the structural test pattern from cycle
      #9 and the principle is enforced at three layers: prose
      (audit trail), code (sealed helpers), tests (assertions).
    category: process
  - date: 2026-05-03
    cycle: "my-tools-explore-new-tabs"
    insight: |
      Auto-populate that requires structurally-typed answers (V1:
      multi_select with slug-valued options only) is way safer
      than fuzzy substring extraction. Backlog originally hinted
      at "tool mentions in onboarding answers" which I almost
      built as a substring scan; the multi_select-only constraint
      sidesteps every false-positive nightmare ("notion in my
      sentence != I use Notion") AND defers the LLM-extraction
      cost to V1.5 when there's actual evidence the structured
      path isn't enough. Pattern: when the source data has
      structure available, prefer the structured path; reach for
      LLM-as-classifier only when the structure runs out.
    category: process
  - date: 2026-05-03
    cycle: "founder-dashboard-and-analytics"
    insight: |
      Anonymization invariants are best enforced at three layers,
      not one: schema (the response model has no field that could
      hold a user identity), helper (aggregations $group by user_id
      then collapse — never project), test (recursive scan of the
      JSON response for forbidden keys with a clear list). Layer 3
      catches future regressions automatically: any new field added
      to the response that names a user will fail the audit test
      without human review. Pattern reusable for any "aggregate-but-
      never-identify" surface.
    category: testing
  - date: 2026-05-03
    cycle: "founder-dashboard-and-analytics"
    insight: |
      Read-only cycles are a legitimate and tight scope. No new
      collections, no new write paths, no schema changes — purely
      read aggregations against an existing event log. The cycle
      shipped in 2 commits + 2 spec/archive commits and added 18
      tests. When the upstream data is good (engagements row per
      meaningful action, well-indexed), analytics endpoints are a
      30-line endpoint + a 50-line helper module + tests. Pattern:
      keep the source-of-truth event log clean, defer analytics to
      a separate read-only cycle, get speed AND clean separation.
    category: process
  - date: 2026-05-03
    cycle: "founder-dashboard-and-analytics"
    insight: |
      Existence-leak protection (404 instead of 403) is now a
      pattern across three cycles (#8 founder launches, #11
      analytics, plus implicit elsewhere). When a non-owner tries
      to read another founder's resource, return 404, not 403.
      403 confirms the resource exists; 404 doesn't. Worth
      formalizing as a "private-to-owner read" pattern: ownership
      check fails → 404 with the same error code as a missing
      resource. Used the same `launch_not_found` error string so
      the founder can't even tell from the error code whether
      they typed a wrong id or hit someone else's launch.
    category: architecture
  - date: 2026-05-03
    cycle: "notifications-in-app"
    insight: |
      A dedicated read endpoint (banner) for a recurring filter
      query beats client-side filtering when the UX is built
      around it. The banner needs the most-recent unread
      concierge_nudge — every app open. A list endpoint + client
      filter would download everything just to show one card.
      A dedicated endpoint is one indexed query per app open.
      Pattern: when the same filter is fired from a hot UX path
      (homepage, app open, route guard), give it a named
      endpoint instead of a query param on the generic list.
    category: architecture
  - date: 2026-05-03
    cycle: "notifications-in-app"
    insight: |
      Best-effort triggers should always be wrapped at the
      site that calls them, not relied on inside the helper. The
      F-NOTIF-7 hook in POST /api/comments wraps the
      insert_notification call in try/except inside the route
      handler. The notification helper itself can raise freely.
      This keeps two invariants separate: (a) the comment write
      always succeeds when the comment is valid, (b) the
      notification system retains its strict error semantics for
      callers that DO want to know about failures (e.g., the
      founder dashboard showing a "delivery failed" indicator
      in V1.5+). Don't bake "best effort" into low-level
      helpers — bake it into the call site.
    category: architecture
  - date: 2026-05-03
    cycle: "notifications-in-app"
    insight: |
      Naming reconciliation across cycles: when an early cycle
      writes a kind/field with one name and a later backlog item
      describes the same concept with a different name, prefer
      keeping the earliest write name and document the synonym.
      Cycle #9 wrote `concierge_nudge`; backlog #12 said
      `launch_match`. Renaming would have meant a Mongo
      migration on every existing row PLUS coordinated client
      updates. The synonym path was zero work for the same
      semantic clarity. Pattern: document name drift, don't
      migrate it, unless the early name is wrong (not just
      different).
    category: process
  - date: 2026-05-06
    cycle: "frontend-core"
    insight: |
      Porting a design template wholesale brings its mock data
      with it. The mesh-app design had hardcoded "Recent activity"
      rows, "profile graph" tag lists, and a sample-community
      picker that READ FROM A FRONTEND CONSTANT, not the backend
      that already had GET /api/communities. I shipped these as-is
      in the first pass; the user caught every one in a single
      audit ("a lot of elements are fake"). Pattern for future
      design ports: walk every authenticated screen with a single
      question — "where does this data come from?" — and either
      wire to a real endpoint or remove it. Authoritative answer
      should NEVER be "from a frontend constant."
    category: process
  - date: 2026-05-06
    cycle: "frontend-core"
    insight: |
      pointer-events:none on a parent kills clicks on every
      descendant. The /founders/launch community picker lived
      inside .onb-graph-meta (a glass-overlay container with
      pointer-events:none so the canvas pulse shows through).
      Chips inherited the property silently. Tests would not
      catch it; only manual click-testing reveals. Pattern: when
      adding interactive elements to a page, explicitly check
      the closest ancestor with pointer-events:none and either
      lift the element out or add pointer-events:auto on the
      element itself.
    category: tooling
  - date: 2026-05-06
    cycle: "frontend-core"
    insight: |
      Form validation that fires on submit feels broken. The
      original /founders/launch validated everything on the
      final submit click — a user filling step 5's pitch field
      and clicking Submit got "Product URL must start with
      http://" (a step-1 error) with no clear way to find the
      offending field. Per-step gating ("Continue" disabled until
      this step's required fields are valid) plus inline error
      hints (URL warning shown directly under the URL field as
      you type) make the failure local to where the user is
      looking. Pattern: validate at the boundary of each step;
      surface errors next to the field, not at the destination.
    category: process
  - date: 2026-05-06
    cycle: "frontend-core"
    insight: |
      Role-aware surfaces beat "render everything, hide for the
      wrong role." The first /home for founders rendered the user
      shell with empty Fresh-for-you / Stack / Communities sections
      because the API calls returned 403. User confusion ("none
      of this makes sense"). Better: detect role at /api/me, mount
      a different component tree per role. Founder gets a launch
      dashboard view (cycle #11 backend), not a degraded user
      view. Pattern: if a screen serves multiple roles, branch
      at the top, not at every section.
    category: architecture
  - date: 2026-05-06
    cycle: "frontend-secondary"
    insight: |
      A "global" overlay component (notification bell, toast
      stack, command palette) should self-position with
      position:fixed in its own wrapper — never rely on the
      mounting context for placement. The first cut put
      <HeaderBell /> inside each page's flex header; on /home
      that placed it inside a narrow left sidebar where the
      dropdown got visually clipped. Pattern: an overlay's
      position is part of its contract. The page mounts it once
      anywhere in the tree; the component owns where it appears.
    category: architecture
  - date: 2026-05-06
    cycle: "frontend-secondary"
    insight: |
      Domain-jargon labels lose users even when the underlying
      flow is fine. "Concierge" tested poorly with both roles —
      users had no concept of a personal AI agent, founders
      thought it was customer-support copy. Renamed to "Inbox"
      (kept the route /concierge for URL stability + backend
      kinds for schema stability). Pattern: split the
      product-internal name (used in code, schemas, telemetry)
      from the user-visible label, and let the label change
      independently when feedback says it's confusing.
    category: process
  - date: 2026-05-06
    cycle: "frontend-secondary"
    insight: |
      External-service init probes are silent latency tax. The
      Weaviate v4 client's connect() does a gRPC health check
      with a default ~30s timeout. On a machine where Weaviate
      Cloud is unreachable, the FIRST POST /admin/launches/{id}
      /approve hung 30s before the failure was cached and
      subsequent requests short-circuited. Fix: pass an explicit
      Timeout(init=2) so the probe fails fast. Pattern: any
      lazy client to an external dependency should have its init
      timeout explicitly set; the library default is "for a
      healthy network", not "for a sandbox / dev box / firewalled
      CI". Also applies to Redis, OpenAI, Mongo.
    category: performance
  - date: 2026-05-06
    cycle: "frontend-secondary"
    insight: |
      A nav item that scrolls to an empty section is worse than
      no nav item. /home left rail's "Communities" used to
      scroll to "Your communities" — but for a brand new user
      that section said "you haven't joined any rooms yet" with
      no further action. Users couldn't find a way to discover
      OR join communities without typing /c/{slug} into the URL
      bar. Built /communities browse page; rewired the rail
      item; added a "→ browse communities" link inside the
      empty state. Pattern: every entry point from the nav
      must lead to either content (filled state) or a clear
      next action (empty state with CTA).
    category: process
  - date: 2026-05-07
    cycle: "live-narrowing-onboarding"
    insight: |
      Hidden assumptions in upstream code break new flows silently.
      The classic /onboarding lazy-creates a profiles row via GET
      /api/questions/next. The new live flow never called that
      endpoint, so users had no profiles row. ensure_profile_embedding
      then bailed silently with `return False`, vector stayed empty,
      hybrid query was skipped, fallback ran with a zero vector,
      and Mongo returned tools in insertion order — which happened
      to be dev/agent-flavored. The user saw "marketer profile gives
      engineering tools" with no error. Pattern: when adding a new
      caller to an existing pipeline, audit ALL silent-bail paths in
      the helpers it depends on. A `return False` that "looks right"
      in the original context can become a major footgun for the
      second caller.
    category: architecture
  - date: 2026-05-07
    cycle: "live-narrowing-onboarding"
    insight: |
      A graph that "looks live" but isn't is worse than no graph.
      First version of the live-onboarding ToolGraph rendered the
      same 16 hardcoded MESH_TOOLS for every persona. Users assumed
      the nodes were their actual matches, were confused when the
      Marketer's graph showed Linear/Cursor/Claude. The right fix
      was to make the ToolGraph accept a `tools` prop and reconcile
      by id (fade-in new, fade-out removed) so nodes ARE the
      backend-returned recommendations. Decorative animation is fine
      for hero/landing surfaces; live-data surfaces should NEVER
      ship with placeholder data that resembles real data.
    category: process
  - date: 2026-05-07
    cycle: "live-narrowing-onboarding"
    insight: |
      Latency budgets cliff under VPN. Set Weaviate gRPC init
      timeout to 2s thinking "either it works or it doesn't". Under
      VPN, gRPC handshake (TCP + TLS + HTTP/2 + health probe) takes
      3-5 RTTs which routinely needs 1.5-2s. Result: every backend
      restart with VPN on cached _client=None and silently fell to
      Mongo cosine fallback, with the user thinking Weaviate was
      working. Bumped to 8s. Pattern: when a timeout sits at the
      cliff between two real-world latencies (LAN ~50ms vs VPN
      ~250ms RTT), pick the timeout that accommodates the slower
      case — fast-fail isn't worth silent degradation.
    category: performance
  - date: 2026-05-07
    cycle: "live-narrowing-onboarding"
    insight: |
      Filtering at the wrong rank-position is a debugging trap.
      Cycle #15 dropped tools tagged `all_time_best` (household
      names) from live-flow results, with over-fetch buffer K+12.
      Counted on "30% global filter rate" being even across the
      ranking. It isn't — household names CLUSTER at the top of
      hybrid scores because they're the most-embedded, best-matched
      tools. The K+12 buffer ate the filter and `count_kept`
      dropped to ~10 instead of K=20. Bumped to K+30. Pattern: when
      filtering POST-rank by a property correlated with rank, the
      filter rate at the top is much higher than the global rate.
      Either filter pre-rank (in the search query) or set the
      buffer 2-3x what global rate suggests.
    category: architecture
